<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>
  To-Do</title>

<!-- React, without needing npm/webpack/vite -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="stylesheet" href="todo.css" />
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const API_BASE = "https://to-do-list-fzlx.onrender.com";
const TOKEN_STORAGE_KEY = "todo_token";

async function apiFetch(token, path, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: "Bearer " + token } : {}),
      ...(options.headers || {}),
    },
  });

  if (!res.ok) {
    let detail = res.statusText;
    try {
      const body = await res.json();
      detail = body.detail || detail;
    } catch (_) {
    }
    const err = new Error(detail);
    err.status = res.status;
    throw err;
  }

  if (res.status === 204) return null;
  return res.json();
}

function AuthScreen({ onAuthenticated }) {
  const [mode, setMode] = useState("login"); // "login" | "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError(null);
    setSubmitting(true);
    try {
      const data = await apiFetch(null, mode === "login" ? "/login" : "/signup", {
        method: "POST",
        body: JSON.stringify({ email, password }),
      });
      onAuthenticated(data.access_token);
    } catch (err) {
      setError(err.message);
    } finally {
      setSubmitting(false);
    }
  }

  return (
    <div>
      <h1 style={{ textAlign: "center" }}>To-Do</h1>

      <div className="auth-tabs">
        <button
          type="button"
          className={mode === "login" ? "primary" : ""}
          onClick={() => { setMode("login"); setError(null); }}
        >
          Log in
        </button>
        <button
          type="button"
          className={mode === "signup" ? "primary" : ""}
          onClick={() => { setMode("signup"); setError(null); }}
        >
          Sign up
        </button>
      </div>

      {error && <div className="error-banner">Something went wrong: {error}</div>}

      <form onSubmit={handleSubmit} className="auth-form">
        <input
          type="email"
          placeholder="Email"
          value={email}
          onChange={(e) => setEmail(e.target.value)}
          required
        />
        <input
          type="password"
          placeholder="Password"
          value={password}
          onChange={(e) => setPassword(e.target.value)}
          minLength={mode === "signup" ? 8 : undefined}
          required
        />
        <button type="submit" className="primary" disabled={submitting}>
          {mode === "login" ? "Log in" : "Sign up"}
        </button>
      </form>
    </div>
  );
}

function TodoApp({ token, onLogout }) {
  const [tasks, setTasks] = useState([]);
  const [newText, setNewText] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editingText, setEditingText] = useState("");
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  function handleError(err) {
    if (err.status === 401) {
      onLogout();
      return;
    }
    setError(err.message);
  }

  async function loadTasks() {
    setLoading(true);
    setError(null);
    try {
      const data = await apiFetch(token, "/tasks");
      setTasks(data);
    } catch (err) {
      handleError(err);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => {
    loadTasks();
  }, []);

  async function handleAdd(e) {
    e.preventDefault();
    if (!newText.trim()) return;
    setError(null);
    try {
      await apiFetch(token, "/tasks", {
        method: "POST",
        body: JSON.stringify({ text: newText }),
      });
      setNewText("");
      loadTasks();
    } catch (err) {
      handleError(err);
    }
  }

  async function handleToggleDone(id) {
    setError(null);
    try {
      await apiFetch(token, `/tasks/${id}`, { method: "PATCH" });
      loadTasks();
    } catch (err) {
      handleError(err);
    }
  }

  async function handleDelete(id) {
    setError(null);
    try {
      await apiFetch(token, `/tasks/${id}`, { method: "DELETE" });
      loadTasks();
    } catch (err) {
      handleError(err);
    }
  }

  function startEdit(task) {
    setEditingId(task.id);
    setEditingText(task.text);
  }

  async function saveEdit(id) {
    if (!editingText.trim()) return;
    setError(null);
    try {
      await apiFetch(token, `/tasks/${id}`, {
        method: "PUT",
        body: JSON.stringify({ text: editingText }),
      });
      setEditingId(null);
      loadTasks();
    } catch (err) {
      handleError(err);
    }
  }

  return (
    <div>
      <div className="topbar">
        <h1>To-Do</h1>
        <button onClick={onLogout}>Log out</button>
      </div>

      {error && (
        <div className="error-banner">
          Something went wrong: {error}
        </div>
      )}

      <form onSubmit={handleAdd}>
        <input
          type="text"
          placeholder="New task"
          value={newText}
          onChange={(e) => setNewText(e.target.value)}
        />
        <button type="submit" className="primary">Add</button>
      </form>

      <ul>
        {tasks.map((task) => (
          <li key={task.id}>
            <input
              type="checkbox"
              checked={task.done}
              onChange={() => handleToggleDone(task.id)}
            />

            {editingId === task.id ? (
              <>
                <input
                  type="text"
                  value={editingText}
                  onChange={(e) => setEditingText(e.target.value)}
                />
                <button onClick={() => saveEdit(task.id)}>Save</button>
                <button onClick={() => setEditingId(null)}>Cancel</button>
              </>
            ) : (
              <>
                <span className={"text" + (task.done ? " done" : "")}>
                  {task.text}
                </span>
                <button onClick={() => startEdit(task)}>Edit</button>
                <button className="danger" onClick={() => handleDelete(task.id)}>Delete</button>
              </>
            )}
          </li>
        ))}
      </ul>

      {!loading && tasks.length === 0 && !error && (
        <p className="loading">No tasks yet — add one above.</p>
      )}
    </div>
  );
}

function Root() {
  const [token, setToken] = useState(() => localStorage.getItem(TOKEN_STORAGE_KEY));

  function handleAuthenticated(newToken) {
    localStorage.setItem(TOKEN_STORAGE_KEY, newToken);
    setToken(newToken);
  }

  function handleLogout() {
    localStorage.removeItem(TOKEN_STORAGE_KEY);
    setToken(null);
  }

  return token ? (
    <TodoApp token={token} onLogout={handleLogout} />
  ) : (
    <AuthScreen onAuthenticated={handleAuthenticated} />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>

</body>
</html>
